<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>QRPipe 发送端</title>
<!-- qrcodejs：经典 script，file:// 下可加载同目录 js -->
<script src="lib/qrcode.min.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
  .row { margin: 8px 0; }
  label { display: inline-block; width: 90px; }
  #qrcode { margin: 16px 0; }
  #qrcode img, #qrcode canvas { display: block; margin: auto; }
  #summary { background: #f5f5f5; padding: 12px; border-radius: 6px; white-space: pre-wrap; }
  button { padding: 6px 14px; margin-right: 8px; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>QRPipe 发送端</h1>

<div id="setup">
  <div class="row"><label>文件：</label><input type="file" id="file"></div>
  <div class="row"><label>任务序号：</label><input type="text" id="taskId" maxlength="1" value="A" style="width:40px;text-transform:uppercase"></div>
  <div class="row"><label>步长(字节)：</label><input type="number" id="step" value="150" min="4"></div>
  <div class="row"><label>频率(张/秒)：</label><input type="number" id="fps" value="2" min="0" step="0.5">（0=手动）</div>
  <div class="row"><label>容错率：</label>
    <select id="ecc"><option>L</option><option selected>M</option><option>Q</option><option>H</option></select>
  </div>
  <div class="row"><button id="analyze">分析文件</button></div>
</div>

<div id="summaryBox" class="hidden">
  <h3>传输概要</h3>
  <div id="summary"></div>
  <button id="confirm">确认开始</button>
  <button id="back">返回修改</button>
</div>

<div id="transmit" class="hidden">
  <div id="qrcode"></div>
  <div class="row" id="pageInfo"></div>
  <button id="prev">◀ 上一页</button>
  <button id="next">▶ 下一页</button>
  <button id="pause">⏸ 暂停/继续</button>
  <button id="stop">⏹ 停止</button>
  <hr>
  <div class="row">重传：输入页码（逗号分隔，如 3,5,7）<input type="text" id="retrans" style="width:160px"><button id="retransBtn">跳转重传</button></div>
</div>

<script type="module">
// ===== 内联 core（与 core/*.mjs 逐字一致，含 export 无害）=====
const MIN_STEP = 4;
function utf8CharLen(b){ if(b<0x80)return 1; if((b>>5)===0b110)return 2; if((b>>4)===0b1110)return 3; if((b>>3)===0b11110)return 4; return 1; }
function* utf8Iterate(bytes){ const dec=new TextDecoder('utf-8',{fatal:false}); let i=0; while(i<bytes.length){ const len=Math.min(utf8CharLen(bytes[i]),bytes.length-i); yield {char:dec.decode(bytes.subarray(i,i+len)),byteLen:len}; i+=len; } }
export function paginate(bytes, stepBytes){ if(!(stepBytes>=MIN_STEP)) throw new RangeError(`stepBytes 必须 >= ${MIN_STEP}`); const pages=[]; let cur='',cb=0; for(const {char,byteLen} of utf8Iterate(bytes)){ if(cb+byteLen>stepBytes && cur!==''){ pages.push(cur); cur=char; cb=byteLen; } else { cur+=char; cb+=byteLen; } } if(cur!=='') pages.push(cur); return pages; }

const SEP='|';
function isValidTaskId(s){ return typeof s==='string' && s.length===1 && s>='A' && s<='Z'; }
export function encodePage(taskId, pageNum, payload){ if(!isValidTaskId(taskId)) throw new TypeError('非法 taskId'); if(!Number.isInteger(pageNum)||pageNum<0) throw new TypeError('非法 pageNum'); return `${taskId}${pageNum}${SEP}${payload}`; }
export function decodePage(str){ if(typeof str!=='string') return null; if(str.length>0&&str.codePointAt(0)===0xFEFF) str=str.slice(1); if(str.length===0) return null; const i=str.indexOf(SEP); if(i<0) return null; const pre=str.slice(0,i); if(pre.length<2) return null; const t=pre[0]; if(!isValidTaskId(t)) return null; const p=Number(pre.slice(1)); if(!Number.isInteger(p)||p<0) return null; return {taskId:t,pageNum:p,payload:str.slice(i+1)}; }
export function encodeMeta(m){ return JSON.stringify(m); }
export function decodeMeta(p){ try{ const o=JSON.parse(p); return (o&&typeof o==='object')?o:null; }catch{ return null; } }

// ---- hash: subtle + 纯JS fallback ----
function toHex(bytes){ let s=''; for(const b of bytes) s+=b.toString(16).padStart(2,'0'); return s; }
const K=new Uint32Array([0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);
function rotr(x,n){ return ((x>>>n)|(x<<(32-n)))>>>0; }
function _pureJsSha256Hex(data){ const bitLen=data.length*8; const len=data.length+1+((56-(data.length+1)%64+64)%64)+8; const m=new Uint8Array(len); m.set(data); m[data.length]=0x80; const dv=new DataView(m.buffer); dv.setUint32(len-4,bitLen>>>0,false); dv.setUint32(len-8,Math.floor(bitLen/0x100000000),false); let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19; const w=new Uint32Array(64); for(let off=0;off<m.length;off+=64){ for(let i=0;i<16;i++) w[i]=dv.getUint32(off+i*4,false); for(let i=16;i<64;i++){ const s0=rotr(w[i-15],7)^rotr(w[i-15],18)^(w[i-15]>>>3); const s1=rotr(w[i-2],17)^rotr(w[i-2],19)^(w[i-2]>>>10); w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0; } let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,hh=h7; for(let i=0;i<64;i++){ const S1=rotr(e,6)^rotr(e,11)^rotr(e,25); const ch=(e&f)^(~e&g); const t1=(hh+S1+ch+K[i]+w[i])>>>0; const S0=rotr(a,2)^rotr(a,13)^rotr(a,22); const maj=(a&b)^(a&c)^(b&c); const t2=(S0+maj)>>>0; hh=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0; } h0=(h0+a)>>>0;h1=(h1+b)>>>0;h2=(h2+c)>>>0;h3=(h3+d)>>>0;h4=(h4+e)>>>0;h5=(h5+f)>>>0;h6=(h6+g)>>>0;h7=(h7+hh)>>>0; } const out=new Uint8Array(32); const ov=new DataView(out.buffer); [h0,h1,h2,h3,h4,h5,h6,h7].forEach((v,i)=>ov.setUint32(i*4,v,false)); return toHex(out); }
export async function sha256Hex(bytes){ const sub=globalThis.crypto&&globalThis.crypto.subtle; if(sub){ try{ const d=await sub.digest('SHA-256',bytes); return toHex(new Uint8Array(d)); }catch{} } return _pureJsSha256Hex(bytes); }

// ---- params ----
const VMAX=10; const ECC_LEVELS=['L','M','Q','H'];
const QR_CAPACITY={1:{L:17,M:14,Q:11,H:7},2:{L:32,M:26,Q:20,H:14},3:{L:53,M:42,Q:32,H:24},4:{L:78,M:62,Q:46,H:34},5:{L:106,M:84,Q:66,H:44},6:{L:134,M:106,Q:86,H:60},7:{L:154,M:122,Q:108,H:74},8:{L:192,M:152,Q:130,H:86},9:{L:230,M:180,Q:150,H:98},10:{L:271,M:213,Q:151,H:119}};
function maxStepBytes(vMax,ecc,digits){ return QR_CAPACITY[vMax][ecc]-(1+digits+1); }
export function recommendVersion(stepBytes,ecc,digits){ for(let v=1;v<=VMAX;v++){ if(maxStepBytes(v,ecc,digits)>=stepBytes) return v; } return null; }
function _qrCountBits(version){ return version < 10 ? 8 : 16; }
// 内部：按 qrcodejs 的 charCodeAt→UTF-8 口径计算 parsedData 字节数，精确匹配 createData 的 getLengthInBits。
//   qrcodejs 的 QR8bitByte 在循环外只声明一次 b 数组，追加字符后不重置；因此后续字符
//   都会追加当前历史最大类别的字节（包含 stale bytes），这里故意复刻该 running-max 行为。
//   类别为 charCode >65536→4B, >2048→3B, >128→2B, 否则1B；若与字符串长度不等则前置 3B BOM。
//   astral 字符以 UTF-16 代理对表示，每个代理按 3B 计 = 6B/字符；必须用此口径，否则会 overflow。
function _qrParsedBytes(str){
  let maxCat = 1;
  let total = 0;
  for (let i = 0; i < str.length; i++){
    const f = str.charCodeAt(i);
    let cat;
    if (f > 65536) cat = 4;
    else if (f > 2048) cat = 3;
    else if (f > 128) cat = 2;
    else cat = 1;
    if (cat > maxCat) maxCat = cat;
    total += maxCat;
  }
  if (total !== str.length) total += 3;
  return total;
}
// 选择能容纳该二维码字符串的最小 QR 版本（1..VMAX）；超 VMAX 返回 null。
// 精确匹配 qrcodejs createData 约束：getLengthInBits = 4(mode) + countBits(V) + 8·parsedData <= 8·QR_CAPACITY[V][ecc]。
function pickVersion(str, ecc){
  const parsedBytes = _qrParsedBytes(str);
  for (let version = 1; version <= VMAX; version++){
    const needBits = 4 + _qrCountBits(version) + 8 * parsedBytes;
    if (needBits <= 8 * QR_CAPACITY[version][ecc]) return version;
  }
  return null;
}
function estimateTime(pages,fps){ return fps? pages/fps : null; }

// ---- buildPages ----
export async function buildPages(bytes, stepBytes, taskId, {name, fps, ecc}){
  const hash='sha256:'+await sha256Hex(bytes);
  const chunks=paginate(bytes, stepBytes);
  const pages=Math.max(1, chunks.length);
  const meta={v:1,t:taskId,name,size:bytes.length,pages,fps,ecc,hash};
  const metaPage=encodePage(taskId,0,encodeMeta(meta));
  const dataPages=chunks.map((c,i)=>encodePage(taskId,i+1,c));
  return {meta,metaPage,dataPages,pages,hash};
}

// ===== UI 逻辑 =====
const $ = (id) => document.getElementById(id);
let built = null;        // {meta, metaPage, dataPages, pages}
let playList = null;     // 当前播放的字符串数组（含第0页）
let idx = 0;
let timer = null;
let fps = 2;

function renderQR(str){
  const box = $('qrcode'); box.innerHTML='';
  const ecc = $('ecc').value;
  const ver = pickVersion(str, ecc);
  if (ver == null){
    box.textContent = '⚠ 该页内容超出 QR V'+VMAX+' 容量，无法生成二维码（请减小步长或容错率）';
    return;
  }
  new QRCode(box, { text: str, width: 320, height: 320, typeNumber: ver, correctLevel: QRCode.CorrectLevel[ecc] });
}

function showPage(i){
  idx = Math.max(0, Math.min(i, playList.length-1));
  $('pageInfo').textContent = idx===0 ? '【第 0 页 · 任务元信息】' : `第 ${idx} / ${playList.length-1} 页`;
  try { renderQR(playList[idx]); }
  catch(e){ $('qrcode').textContent = '⚠ 生成二维码失败：'+e.message; }
}

function startAuto(){
  stopAuto();
  if(!fps) return; // 手动
  timer = setInterval(()=>{ if(idx < playList.length-1) showPage(idx+1); else stopAuto(); }, 1000/fps);
}
function stopAuto(){ if(timer){ clearInterval(timer); timer=null; } }

$('analyze').addEventListener('click', async ()=>{
  const f = $('file').files[0];
  if(!f){ alert('请先选择文件'); return; }
  const taskId = $('taskId').value.toUpperCase();
  if(!/^[A-Z]$/.test(taskId)){ alert('任务序号必须是 1 位大写字母'); return; }
  const step = Number($('step').value);
  if(!(step>=4)){ alert('步长必须 >= 4'); return; }
  fps = Number($('fps').value);
  const ecc = $('ecc').value;
  const buf = new Uint8Array(await f.arrayBuffer());
  if(buf.length===0){ alert('文件为空'); return; }
  built = await buildPages(buf, step, taskId, {name:f.name, fps, ecc});
  // 容量校验：对实际生成页串逐一 pickVersion，任一页超 VMAX 则禁止开始
  const allPages = [built.metaPage, ...built.dataPages];
  let needV = 0, tooLarge = false;
  for (const s of allPages){ const v = pickVersion(s, ecc); if (v == null){ tooLarge = true; break; } if (v > needV) needV = v; }
  const t = estimateTime(built.pages, fps);
  $('summary').textContent =
    `文件名：${f.name}\n`+
    `大小：${buf.length} 字节\n`+
    `任务序号：${taskId}\n`+
    `总数据页：${built.pages} 页（+ 第0页元信息）\n`+
    `步长：${step} 字节\n`+
    `容错率：${ecc}\n`+
    `翻页频率：${fps? fps+' 张/秒':'手动'}\n`+
    `所需 QR 版本：${!tooLarge ? needV : '超出 V'+VMAX+' 上限'}${tooLarge?'（请减小步长或容错率）':''}\n`+
    `预计总时间：${t!=null? (t>=60? (t/60).toFixed(1)+' 分钟' : t.toFixed(1)+' 秒'):'手动模式'}\n`+
    `hash：${built.hash}`;
  $('confirm').disabled = tooLarge; // 步长超限禁止开始，避免生成过大二维码
  $('setup').classList.add('hidden');
  $('summaryBox').classList.remove('hidden');
});

$('back').addEventListener('click', ()=>{
  $('summaryBox').classList.add('hidden');
  $('setup').classList.remove('hidden');
});

$('confirm').addEventListener('click', ()=>{
  $('summaryBox').classList.add('hidden');
  $('transmit').classList.remove('hidden');
  playList = [built.metaPage, ...built.dataPages];
  showPage(0);
  // 第0页停留 2 秒后自动开始（若非手动）
  if(fps){ setTimeout(()=>startAuto(), 2000); }
});

$('prev').addEventListener('click', ()=>{ showPage(idx-1); });
$('next').addEventListener('click', ()=>{ showPage(idx+1); });
$('pause').addEventListener('click', ()=>{ if(timer){ stopAuto(); } else { startAuto(); } });
$('stop').addEventListener('click', ()=>{ stopAuto(); alert('传输已停止。可在下方输入页码重传。'); });

$('retransBtn').addEventListener('click', ()=>{
  const raw = $('retrans').value.trim();
  if(!raw) return;
  const nums = raw.split(',').map(s=>Number(s.trim())).filter(n=>Number.isInteger(n) && n>=1 && n<=built.pages);
  if(nums.length===0){ alert('请输入有效页码'); return; }
  // 进入补传：只播放指定页（与首次内容一致，确定性）
  stopAuto();
  playList = nums.map(n=>built.dataPages[n-1]);
  showPage(0);
});
</script>
</body>
</html>
